# prefix: C-a (easier reach than C-b)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# core
set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:RGB"
set -g escape-time 0
set -g history-limit 50000
set -g display-time 4000
set -g focus-events on
set -g mouse on
set -g mode-keys vi
set -g status-keys emacs

# windows & panes (1-indexed, auto-renumber)
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# splits open in current path
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"
unbind '"'
unbind %

# pane resize (repeatable)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# quick window cycling
bind -n M-h previous-window
bind -n M-l next-window

# vim-tmux-navigator: C-h/j/k/l works in both vim splits and tmux panes
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
  | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf)(diff)?$'"
bind -n 'C-h' if-shell "$is_vim" 'send-keys C-h' 'select-pane -L'
bind -n 'C-j' if-shell "$is_vim" 'send-keys C-j' 'select-pane -D'
bind -n 'C-k' if-shell "$is_vim" 'send-keys C-k' 'select-pane -U'
bind -n 'C-l' if-shell "$is_vim" 'send-keys C-l' 'select-pane -R'
bind -n 'C-\' if-shell "$is_vim" 'send-keys C-\\' 'select-pane -l'
bind -T copy-mode-vi 'C-h' select-pane -L
bind -T copy-mode-vi 'C-j' select-pane -D
bind -T copy-mode-vi 'C-k' select-pane -U
bind -T copy-mode-vi 'C-l' select-pane -R

# vi copy mode
bind Enter copy-mode
bind -T copy-mode-vi v     send -X begin-selection
bind -T copy-mode-vi C-v   send -X rectangle-toggle
bind -T copy-mode-vi y     send -X copy-pipe-and-cancel 'xclip -in -selection clipboard 2>/dev/null || xsel -bi 2>/dev/null'
bind -T copy-mode-vi Escape send -X cancel

# reload config
bind r source-file ~/.config/tmux/tmux.conf \; display " tmux.conf reloaded"

# status bar — Tokyo Night
set -g status-position bottom
set -g status-interval 5
set -g status-style "bg=#1a1b26 fg=#c0caf5"

set -g status-left-length 40
set -g status-left "#[bg=#7aa2f7,fg=#1a1b26,bold] #S #[bg=#1a1b26,fg=#7aa2f7,nobold]  "

set -g status-right-length 60
set -g status-right "#[fg=#565f89]  %H:%M   %d %b  #[fg=#7aa2f7,bold] #H "

set -g window-status-separator ""
set -g window-status-format         "#[fg=#565f89] #I #W  "
set -g window-status-current-format "#[bg=#7aa2f7,fg=#1a1b26,bold] #I #W #[bg=#1a1b26,fg=#7aa2f7,nobold]  "

set -g pane-border-style        "fg=#3b4261"
set -g pane-active-border-style "fg=#7aa2f7"
set -g message-style            "bg=#1a1b26 fg=#e0af68 bold"
set -g message-command-style    "bg=#1a1b26 fg=#e0af68"
set -g mode-style               "bg=#7aa2f7 fg=#1a1b26"
